  <script>
  (function () {
    var cfg = JSON.parse(document.getElementById('desk-payload').textContent);
    var card = document.getElementById('card');
    var form = document.getElementById('form');
    var pw = document.getElementById('pw');
    var err = document.getElementById('err');
    var btn = document.getElementById('btn');
    var sub = document.getElementById('sub');
    var rememberBox = document.getElementById('remember');
    var KEY = 'desk-unlock:' + location.pathname;

    function b64ToBytes(b64) {
      var bin = atob(b64), out = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }
    function getSaved() { try { return localStorage.getItem(KEY); } catch (e) { return null; } }
    function save(p) { try { localStorage.setItem(KEY, p); } catch (e) {} }
    function forget() { try { localStorage.removeItem(KEY); } catch (e) {} }

    async function decrypt(password) {
      var enc = new TextEncoder();
      var baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
      var key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: b64ToBytes(cfg.salt), iterations: cfg.iter, hash: 'SHA-256' },
        baseKey, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
      var ptBuf = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: b64ToBytes(cfg.iv) }, key, b64ToBytes(cfg.ct));
      return new TextDecoder().decode(ptBuf);
    }
    function render(htmlText) { document.open(); document.write(htmlText); document.close(); }

    if (!(window.crypto && window.crypto.subtle)) {
      err.textContent = 'This browser cannot decrypt the page (open it over https).';
      return;
    }

    // Already unlocked on this device? Decrypt silently — no prompt on refresh.
    var saved = getSaved();
    if (saved) {
      card.classList.add('loading');
      decrypt(saved).then(render).catch(function () {
        forget();
        card.classList.remove('loading');
        pw.focus();
      });
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true; btn.textContent = 'Unlocking…';
      try {
        var htmlText = await decrypt(pw.value);
        if (rememberBox.checked) save(pw.value); else forget();
        render(htmlText);
      } catch (ex) {
        err.textContent = 'Wrong password — try again.';
        btn.disabled = false; btn.textContent = 'Unlock';
        pw.select();
      }
    });
  })();
  </script>
