<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Keep protected pages out of search engines. -->
  <meta name="robots" content="noindex, nofollow">
  <title>Protected document</title>
  <style>
    :root { color-scheme: light dark; }
    html,body{height:100%;margin:0}
    body{
      display:grid;place-items:center;padding:24px;box-sizing:border-box;
      font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:#0f172a;color:#e2e8f0;
    }
    .card{
      width:100%;max-width:380px;background:#1e293b;border:1px solid #334155;
      border-radius:16px;padding:32px;box-shadow:0 20px 50px -20px rgba(0,0,0,.6);
      text-align:center;
    }
    .lock{font-size:34px;line-height:1}
    h1{font-size:19px;margin:14px 0 6px;font-weight:650}
    p.sub{margin:0 0 22px;color:#94a3b8;font-size:14px}
    input{
      width:100%;box-sizing:border-box;padding:12px 14px;font-size:15px;
      border-radius:10px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;
      outline:none;transition:border-color .15s;
    }
    input:focus{border-color:#6366f1}
    button{
      width:100%;margin-top:12px;padding:12px 14px;font-size:15px;font-weight:600;
      border:0;border-radius:10px;background:#6366f1;color:#fff;cursor:pointer;
      transition:background .15s;
    }
    button:hover{background:#4f46e5}
    button:disabled{opacity:.6;cursor:default}
    .err{color:#fca5a5;font-size:13.5px;margin:14px 0 0;min-height:1.2em}
  </style>
</head>
<body>
  <main class="card">
    <div class="lock">🔒</div>
    <h1>Protected document</h1>
    <p class="sub">Enter the password to view this page.</p>
    <form id="form" autocomplete="off">
      <input id="pw" type="password" autocomplete="off" autofocus placeholder="Password" aria-label="Password">
      <button id="btn" type="submit">Unlock</button>
      <p class="err" id="err" role="alert"></p>
    </form>
  </main>

  <script id="desk-payload" type="application/json">__DESK_PAYLOAD__</script>
  <script>
  (function () {
    var cfg = JSON.parse(document.getElementById('desk-payload').textContent);
    var form = document.getElementById('form');
    var pw = document.getElementById('pw');
    var err = document.getElementById('err');
    var btn = document.getElementById('btn');

    function b64ToBytes(b64) {
      var bin = atob(b64), out = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    if (!(window.crypto && window.crypto.subtle)) {
      err.textContent = 'This browser cannot decrypt the page (open it over https).';
      return;
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true; btn.textContent = 'Unlocking…';
      try {
        var enc = new TextEncoder();
        var baseKey = await crypto.subtle.importKey(
          'raw', enc.encode(pw.value), 'PBKDF2', false, ['deriveKey']);
        var key = await crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: b64ToBytes(cfg.salt), iterations: cfg.iter, hash: 'SHA-256' },
          baseKey, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
        var ptBuf = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: b64ToBytes(cfg.iv) }, key, b64ToBytes(cfg.ct));
        var html = new TextDecoder().decode(ptBuf);
        document.open(); document.write(html); document.close();
      } catch (ex) {
        err.textContent = 'Wrong password — try again.';
        btn.disabled = false; btn.textContent = 'Unlock';
        pw.select();
      }
    });
  })();
  </script>
</body>
</html>
